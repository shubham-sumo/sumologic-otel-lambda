name: Release Finalize

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to finalize"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-finalize-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-22.04
    steps:
      - name: Extract release details
        id: parse
        env:
          TAG: ${{ inputs.tag }}
        run: |
          if ! [[ "${TAG}" =~ ^(java|nodejs|python)-v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "::error::Unexpected release tag: ${TAG}"
            exit 1
          fi

          LANGUAGE="${BASH_REMATCH[1]}"
          VERSION="${BASH_REMATCH[2]}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "language=${LANGUAGE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_branch=release-${TAG}" >> "$GITHUB_OUTPUT"

      - name: Check for existing release pull request
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_BRANCH: ${{ steps.parse.outputs.release_branch }}
        run: |
          PR_URL=$(gh pr list \
            --repo "${GITHUB_REPOSITORY}" \
            --state all \
            --base main \
            --head "${RELEASE_BRANCH}" \
            --json url \
            --jq '.[0].url // empty')
          if [[ -n "${PR_URL}" ]]; then
            echo "Release pull request already exists or was completed: ${PR_URL}"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.existing.outputs.skip != 'true'
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        if: steps.existing.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "github-actions[bot]@users.noreply.github.com"

      - name: Create release branch
        if: steps.existing.outputs.skip != 'true'
        env:
          RELEASE_BRANCH: ${{ steps.parse.outputs.release_branch }}
        run: |
          if git ls-remote --exit-code --heads origin "${RELEASE_BRANCH}"; then
            echo "::error::Branch ${RELEASE_BRANCH} exists without an open PR"
            exit 1
          fi
          git checkout -b "${RELEASE_BRANCH}"

      - name: Update README with ARN tables
        if: steps.existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.parse.outputs.tag }}
          LANGUAGE: ${{ steps.parse.outputs.language }}
          VERSION: ${{ steps.parse.outputs.version }}
        run: ./ci/release-finalize.sh

      - uses: actions/setup-node@v4
        if: steps.existing.outputs.skip != 'true'

      - name: Format markdown tables
        if: steps.existing.outputs.skip != 'true'
        env:
          LANGUAGE: ${{ steps.parse.outputs.language }}
        run: |
          npm install --no-save markdown-table-formatter
          ./node_modules/.bin/markdown-table-formatter \
            "${LANGUAGE}/README.md"

      - name: Commit and push release branch
        if: steps.existing.outputs.skip != 'true'
        env:
          TAG: ${{ steps.parse.outputs.tag }}
          LANGUAGE: ${{ steps.parse.outputs.language }}
          RELEASE_BRANCH: ${{ steps.parse.outputs.release_branch }}
        run: |
          git add "${LANGUAGE}/README.md"
          git commit -m "docs: update ${LANGUAGE} layer ARNs for ${TAG}"
          git push origin "${RELEASE_BRANCH}"

      - name: Create pull request
        if: steps.existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.parse.outputs.tag }}
          LANGUAGE: ${{ steps.parse.outputs.language }}
          RELEASE_BRANCH: ${{ steps.parse.outputs.release_branch }}
        run: |
          REPO="${GITHUB_REPOSITORY}"
          BODY="Updates \`${LANGUAGE}/README.md\` with layer ARNs "
          BODY+="from the [pre-release]"
          BODY+="(https://github.com/${REPO}/releases/tag/${TAG})."
          BODY+=$'\n\n'
          BODY+="Merging promotes the pre-release to a full release."
          gh pr create \
            --title "docs: release ${TAG}" \
            --body "${BODY}" \
            --base main \
            --head "${RELEASE_BRANCH}"
