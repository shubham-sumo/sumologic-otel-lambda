name: Release Prepare

on:
  workflow_dispatch:
    inputs:
      language:
        description: "Language to release"
        required: true
        type: choice
        options:
          - java
          - nodejs
          - python
      version:
        description: "Version (e.g. 1.41.0)"
        required: true
        type: string
      otel_lambda_tag:
        description: >-
          opentelemetry-lambda release tag to pin the submodule to
          (e.g. layer-python/0.19.0, layer-nodejs/0.21.0,
          layer-javaagent/0.19.0)
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-22.04
    env:
      LANGUAGE: ${{ inputs.language }}
      VERSION: ${{ inputs.version }}
      OTEL_LAMBDA_TAG: ${{ inputs.otel_lambda_tag }}
      BRANCH: prepare-${{ inputs.language }}-v${{ inputs.version }}
    steps:
      - name: Validate version format
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must be semver without v prefix (e.g. 1.41.0)"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Check release tag and branch do not already exist
        run: |
          TAG="${LANGUAGE}-v${VERSION}"
          if git tag --list "${TAG}" | grep -q .; then
            echo "::error::Tag ${TAG} already exists"
            exit 1
          fi
          if git ls-remote --heads origin "${BRANCH}" | grep -q .; then
            echo "::error::Branch ${BRANCH} already exists on remote"
            exit 1
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "github-actions[bot]@users.noreply.github.com"

      - name: Create branch
        run: git checkout -b "${BRANCH}"

      - name: Update submodule to otel-lambda release
        id: submodule
        run: |
          cd opentelemetry-lambda
          git fetch --tags origin
          git checkout "${{ inputs.otel_lambda_tag }}"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          cd ..

      - name: Run prepare script
        run: ./ci/release-prepare.sh

      - name: Commit changes
        run: |
          git add \
            ".github/upstream-release-${LANGUAGE}.txt" \
            "changelog/${LANGUAGE}-v${VERSION}.md" \
            "${LANGUAGE}/version.txt" \
            README.md \
            "${LANGUAGE}/layer-data.sh" \
            "${LANGUAGE}/sample-apps/template.yaml" \
            opentelemetry-lambda
          COMMIT_MSG="feat: prepare release ${LANGUAGE} v${VERSION}"
          git commit -m "${COMMIT_MSG}"

      - name: Push branch
        run: git push origin "${BRANCH}"

      - name: Ensure release label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create release \
            --color "0075ca" \
            --description "Release PR" \
            2>/dev/null || true

      - name: Create pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SUBMODULE_COMMIT="${{ steps.submodule.outputs.commit }}"
          UPSTREAM_REPO="https://github.com/open-telemetry/opentelemetry-lambda"
          gh pr create \
            --title "feat: prepare release ${LANGUAGE} v${VERSION}" \
            --body "Automated release preparation for \`${LANGUAGE}-v${VERSION}\`.

          ### Submodule reference

          - **Tag:** [\`${{ inputs.otel_lambda_tag }}\`](${UPSTREAM_REPO}/releases/tag/${{ inputs.otel_lambda_tag }})
          - **Commit:** [\`${SUBMODULE_COMMIT:0:12}\`](${UPSTREAM_REPO}/commit/${SUBMODULE_COMMIT})

          ### Pre-merge checklist

          - [ ] Review CHANGELOG.md entry
          - [ ] Verify \`${LANGUAGE}/layer-data.sh\` version
          - [ ] Verify \`${LANGUAGE}/sample-apps/template.yaml\` version
          - [ ] Verify README.md component versions
          - [ ] Approve this PR

          Merging will create tag \`${LANGUAGE}-v${VERSION}\` and trigger the release build." \
            --base main \
            --head "${BRANCH}" \
            --label release
